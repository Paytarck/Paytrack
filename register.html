<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Paytrack-icon.png">
    <title>Register - PayTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="p-4 bg-gradient-to-br from-blue-900 to-blue-600 min-h-screen flex items-center justify-center font-[Inter]">

    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-purple-600"></div>

        <div class="text-center mb-8 mt-2">
            <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>
            <p class="text-gray-500 mt-1">Join PayTrack today</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <!-- Username -->
            <div>
                <label class="block text-gray-700 text-xs font-bold mb-1 uppercase">Username</label>
                <input type="text" id="regUsername" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="john123 (No spaces)">
            </div>
            
            <!-- Email -->
            <div>
                <label class="block text-gray-700 text-xs font-bold mb-1 uppercase">Email</label>
                <input type="email" id="regEmail" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="name@example.com">
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-gray-700 text-xs font-bold mb-1 uppercase">Phone Number</label>
                <div class="flex gap-2">
                    <select id="countryCodeSelect" class="w-1/3 px-2 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white text-sm">
                        <!-- Populated by JS -->
                    </select>
                    <input type="tel" id="regPhone" class="w-2/3 px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="1234567890">
                </div>
            </div>

            <!-- PIN -->
            <div>
                <label class="block text-gray-700 text-xs font-bold mb-1 uppercase">4-Digit PIN</label>
                <input type="password" id="regPin" maxlength="4" inputmode="numeric" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none text-center text-xl tracking-widest font-mono" placeholder="••••">
            </div>

            <button type="submit" id="regBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all mt-4 flex justify-center">
                <span id="regBtnText">Register</span>
                <i id="regSpinner" class="fas fa-spinner fa-spin hidden"></i>
            </button>
        </form>

        <!-- Divider -->
        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">Or</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <!-- Google Signup Button -->
        <button id="googleRegBtn" class="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-lg shadow-sm flex items-center justify-center gap-3 transition-colors">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
            <span>Sign up with Google</span>
        </button>
        
        <!-- Error Box -->
        <div id="regError" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm border border-red-200 flex items-center">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span id="regErrorText"></span>
        </div>

        <div class="text-center mt-6 pt-4 border-t border-gray-100">
            <a href="login.html" class="text-blue-600 font-semibold hover:underline text-sm">Already have an account? Login</a>
        </div>
    </div>

    <script type="module">
        import { registerUser, handleGoogleAuth } from './auth.js';
        import { countryCodes } from './countries.js';

        // 1. Populate Country Codes
        const codeSelect = document.getElementById('countryCodeSelect');
        const defaultCode = "+92"; 

        countryCodes.forEach(country => {
            const option = document.createElement('option');
            option.value = country.code;
            option.textContent = `${country.code} (${country.name})`;
            if(country.code === defaultCode) option.selected = true;
            codeSelect.appendChild(option);
        });

        // 2. Elements
        const form = document.getElementById('registerForm');
        const errorBox = document.getElementById('regError');
        const errorText = document.getElementById('regErrorText');
        const btn = document.getElementById('regBtn');
        const btnText = document.getElementById('regBtnText');
        const spinner = document.getElementById('regSpinner');
        const googleRegBtn = document.getElementById('googleRegBtn');

        // 3. Manual Registration
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phoneNum = document.getElementById('regPhone').value.trim();
            const countryCode = codeSelect.value;
            const pin = document.getElementById('regPin').value;

            // Simple Validations
            if (username.length < 3) { showError("Username too short."); setLoading(false); return; }
            if (pin.length !== 4) { showError("PIN must be 4 digits."); setLoading(false); return; }

            const fullPhone = countryCode + phoneNum;

            try {
                await registerUser(username, email, fullPhone, pin);
                window.location.href = 'login.html?registered=true';
            } catch (err) {
                showError(err.message);
                setLoading(false);
            }
        });

        // 4. Google Registration
        googleRegBtn.addEventListener('click', async () => {
            hideError();
            googleRegBtn.disabled = true;
            googleRegBtn.classList.add('opacity-50');

            try {
                // This function in auth.js handles checking if user exists, 
                // and CREATES the DB record if they don't.
                await handleGoogleAuth();
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error(err);
                showError("Google Sign-Up failed. " + err.message);
                googleRegBtn.disabled = false;
                googleRegBtn.classList.remove('opacity-50');
            }
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        function hideError() {
            errorBox.classList.add('hidden');
        }

        function setLoading(isLoading) {
            btn.disabled = isLoading;
            if (isLoading) {
                btnText.classList.add('hidden');
                spinner.classList.remove('hidden');
            } else {
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
