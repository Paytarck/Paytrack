<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayTrack - Offline</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 10px; }
        p { opacity: 0.8; margin-bottom: 30px; }
        .btn {
            background: #4facfe;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡❌</div>
        <h1>Device is Offline</h1>
        <p>PayTrack requires an internet connection to sync your financial data securely.</p>
        <button class="btn" onclick="checkConnection()">Retry Connection</button>
    </div>

    <script>
        function checkConnection() {
            if (navigator.onLine) {
                window.location.replace('index.html');
            } else {
                alert("Still offline. Please check your Wi-Fi or Mobile Data.");
            }
        }
    </script>
</body>
</html>
